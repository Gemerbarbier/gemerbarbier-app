spring:
  datasource:
    url: ${DB_URL}:jdbc:postgresql://localhost:5438/gemerbarbier-db
    username: ${DB_USERNAME}:gemerbarbier
    password: ${DB_PASSWORD}:gemerbarbier
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
jwt:
  secret: ${JWT_SECRET}
