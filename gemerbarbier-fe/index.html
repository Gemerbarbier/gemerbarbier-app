<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemerbarbier - Prémiové Holičstvo & Služby Starostlivosti</title>
    <meta name="description" content="Zažite prémiovú starostlivosť v Gemerbarbier. Skúsení holiči, klasické strihy, tradičné holenie a moderný štýl v sofistikovanej industriálnej atmosfére." />
    <meta name="author" content="Gemerbarbier" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <meta property="og:title" content="Gemerbarbier - Prémiové Holičstvo & Služby Starostlivosti" />
    <meta property="og:description" content="Zažite prémiovú starostlivosť v Gemerbarbier. Skúsení holiči, klasické strihy, tradičné holenie a moderný štýl." />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <script>
      fetch('/version.json?v=' + Date.now(), { cache: 'no-store' })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var stored = localStorage.getItem('_appVersion');
          if (stored && stored !== data.version) {
            localStorage.setItem('_appVersion', data.version);
            window.location.reload();
          } else {
            localStorage.setItem('_appVersion', data.version);
          }
        })
        .catch(function () {});
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
